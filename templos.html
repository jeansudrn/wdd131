<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum do Templo</title>
    <meta name="description" content="Um álbum de fotos responsivo exibindo belos templos ao redor do mundo.">
    
    <!-- Chamada da API do Google Fonts (Montserrat e Roboto) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Vinculação dos arquivos CSS externos (Abordagem Mobile First) -->
    <link rel="stylesheet" href="css/templos.css">
    <link rel="stylesheet" href="css/templos-grandes.css" media="(min-width: 768px)">
    
    <!-- JavaScript com carregamento adiado (defer) -->
    <script src="js/temples.js" defer></script>
</head>
<body>

    <!-- Elemento Estrutural: Header (Com wrapper para o botão hambúrguer) -->
    <header>
        <div class="header-container">
            <h1>Álbum do Templo</h1>
            <!-- Botão do menu hambúrguer visível apenas no mobile -->
            <button id="menu-button" aria-label="Abrir Menu"></button>
        </div>
        <!-- Navegação configurada com CSS Flexbox -->
        <nav id="nav-menu">
            <ul>
                <li><a href="#">Página Inicial</a></li>
                <li><a href="#">Antigo</a></li>
                <li><a href="#">Novo</a></li>
                <li><a href="#">Grande</a></li>
                <li><a href="#">Pequeno</a></li>
            </ul>
        </nav>
    </header>

    <!-- Elemento Estrutural: Main (Largura limitada e centralizado) -->
    <main>
        <h1>Galeria de Templos</h1>
        
        <!-- Container que ativa a Grade CSS (CSS Grid) -->
        <div class="gallery-container">
            
            <figure>
                <img src="images/images.jpg" alt="Templo de Salt Lake moderno sob céu azul claro" loading="lazy">
                <figcaption>Templo de Salt Lake</figcaption>
            </figure>

            <figure>
                <img src="images/roma.jpg" alt="Fachada de mármore do Templo de Roma" loading="lazy">
                <figcaption>Templo de Roma</figcaption>
            </figure>

            <figure>
                <img src="images/paris.jpg" alt="Templo de Paris cercado por jardins bem cuidados" loading="lazy">
                <figcaption>Templo de Paris</figcaption>
            </figure>

            <figure>
                <img src="images/toquio.jpg" alt="Arquitetura única do Templo de Tóquio à noite" loading="lazy">
                <figcaption>Templo de Tóquio</figcaption>
            </figure>

            <figure>
                <img src="images/saopaulo.jpg" alt="Templo de São Paulo com suas linhas clássicas" loading="lazy">
                <figcaption>Templo de São Paulo</figcaption>
            </figure>

            <figure>
                <img src="images/frankfurt.jpg" alt="Estrutura imponente do Templo de Frankfurt" loading="lazy">
                <figcaption>Templo de Frankfurt</figcaption>
            </figure>

            <figure>
                <img src="images/lisboa.jpg" alt="Templo de Lisboa refletindo a luz do sol" loading="lazy">
                <figcaption>Templo de Lisboa</figcaption>
            </figure>

            <figure>
                <img src="images/kyiv.jpg" alt="Templo de Kyiv com suas torres douradas" loading="lazy">
                <figcaption>Templo de Kyiv</figcaption>
            </figure>

            <figure>
                <img src="images/sydney.jpg" alt="Templo de Sydney integrado à natureza local" loading="lazy">
                <figcaption>Templo de Sydney</figcaption>
            </figure>

        </div>
    </main>

    <!-- Elemento Estrutural: Footer (Contém os ganchos id para o script dinâmico) -->
    <footer>
        <p>&copy; <span id="currentyear"></span> | Seu Nome Completo | Brasil</p>
        <p>Última Modificação: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
