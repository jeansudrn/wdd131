<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum do Templo</title>
    <meta name="description" content="Um álbum de fotos responsivo exibindo belos templos ao redor do mundo.">
    <meta name="author" content="Seu Nome Completo">
    
    <!-- Links de Preconnect Obrigatórios -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Arquivos CSS Locais (Sem atributo media na tag para o validador) -->
    <link rel="stylesheet" href="estilos/templos.css">
    <link rel="stylesheet" href="estilos/templos-grande.css">
    
    <!-- JavaScript Externo Adiado -->
    <script src="scripts/templos.js" defer></script>
</head>
<body>

    <header>
        <div class="header-container">
            <p class="header-title">Álbum do Templo</p>
            <button id="menu-button" aria-label="Abrir Menu"></button>
        </div>
        <!-- Navegação configurada com CSS Flexbox -->
        <nav id="nav-menu">
            <ul>
                <li><a href="#home">Página Inicial</a></li>
                <li><a href="#antigo">Antigo</a></li>
                <li><a href="#novo">Novo</a></li>
                <li><a href="#grande">Grande</a></li>
                <li><a href="#pequeno">Pequeno</a></li>
            </ul>
        </nav>
    </header>

    <!-- Elemento Estrutural: Main (Contém o ÚNICO h1 da página) -->
    <main>
        <h1>Galeria de Templos</h1>
        
        <!-- Container que ativa a Grade CSS (CSS Grid) -->
        <div class="gallery-container">
            
            <figure>
                <img src="imagens/images.jpg" alt="Templo de Salt Lake moderno sob céu azul claro" loading="lazy">
                <figcaption>Templo de Salt Lake</figcaption>
            </figure>

            <figure>
                <img src="imagens/roma.jpg" alt="Fachada de mármore do Templo de Roma" loading="lazy">
                <figcaption>Templo de Roma</figcaption>
            </figure>

            <figure>
                <img src="imagens/paris.jpg" alt="Templo de Paris cercado por jardins bem cuidados" loading="lazy">
                <figcaption>Templo de Paris</figcaption>
            </figure>

            <figure>
                <img src="imagens/toquio.jpg" alt="Arquitetura única do Templo de Tóquio à noite" loading="lazy">
                <figcaption>Templo de Tóquio</figcaption>
            </figure>

            <figure>
                <img src="imagens/saopaulo.jpg" alt="Templo de São Paulo com suas linhas clássicas" loading="lazy">
                <figcaption>Templo de São Paulo</figcaption>
            </figure>

            <figure>
                <img src="imagens/frankfurt.jpg" alt="Estrutura imponente do Templo de Frankfurt" loading="lazy">
                <figcaption>Templo de Frankfurt</figcaption>
            </figure>

            <figure>
                <img src="imagens/lisboa.jpg" alt="Templo de Lisboa refletindo a luz do sol" loading="lazy">
                <figcaption>Templo de Lisboa</figcaption>
            </figure>

            <figure>
                <img src="imagens/kyiv.jpg" alt="Templo de Kyiv com suas torres douradas" loading="lazy">
                <figcaption>Templo de Kyiv</figcaption>
            </figure>

            <figure>
                <img src="imagens/sydney.jpg" alt="Templo de Sydney integrado à natureza local" loading="lazy">
                <figcaption>Templo de Sydney</figcaption>
            </figure>

        </div>
    </main>

    <!-- Elemento Estrutural: Footer -->
    <footer>
        <p>&copy; <span id="currentyear"></span> | Seu Nome Completo | Brasil</p>
        <p>Última Modificação: <span id="lastModified"></span></p>
    </footer>

</body>
